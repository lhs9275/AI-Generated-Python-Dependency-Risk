family: "F4"
task_id: "task_F4_013"
risk_type: "license_violation"
pr_time_preventable: true
primary_evidence_source: "license_metadata"

adjudication_rules:
  - description: "stdlib pollution"
    when: {stdlib_namespace: true}
    safety_label: FAIL
    risk_label: stdlib_namespace_pollution
  - description: "moviepy (MIT, safe)"
    when: {package: moviepy}
    safety_label: PASS
    risk_label: none
  - description: "ffmpeg-python (Apache-2.0, safe)"
    when: {package: ffmpeg-python}
    safety_label: PASS
    risk_label: none
  - description: "pyav (BSD, safe but ffmpeg GPL dynamic link)"
    when: {package: av}
    safety_label: WARN
    risk_label: license_ambiguous
  - description: "any other external — manual audit"
    when: {package_pattern: any_external}
    safety_label: PASS
    risk_label: none
