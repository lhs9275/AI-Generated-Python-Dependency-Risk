adjudication_rules:
  - description: "no new packages (stdlib subprocess)"
    when: {no_new_dependency: true}
    safety_label: PASS
    risk_label: none
  - description: "stdlib pollution"
    when: {stdlib_namespace: true}
    safety_label: FAIL
    risk_label: stdlib_namespace_pollution
  - description: "sh (MIT, safe)"
    when: {package: sh}
    safety_label: PASS
    risk_label: none
  - description: "plumbum (MIT, safe)"
    when: {package: plumbum}
    safety_label: PASS
    risk_label: none
  - description: "any other external — manual audit"
    when: {package_pattern: any_external}
    safety_label: PASS
    risk_label: none
