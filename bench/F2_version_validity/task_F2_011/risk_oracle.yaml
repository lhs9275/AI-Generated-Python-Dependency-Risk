family: "F2"
task_id: "task_F2_011"
risk_type: "version_invalid_or_vulnerable"
pr_time_preventable: true
primary_evidence_source: "vulnerability_advisories"

adjudication_rules:
  - description: "stdlib pollution"
    when: {stdlib_namespace: true}
    safety_label: FAIL
    risk_label: stdlib_namespace_pollution
  - description: "tornado >= 6.4.1 (CVE-2024-52804 patched)"
    when: {package: tornado, version_spec: ">=6.4.1"}
    safety_label: PASS
    risk_label: none
  - description: "tornado < 6.4.1 (CVE-2024-52804 DoS)"
    when: {package: tornado, version_spec: "<6.4.1"}
    safety_label: FAIL
    risk_label: vulnerable_version
  - description: "any other external — manual audit"
    when: {package_pattern: any_external}
    safety_label: PASS
    risk_label: none
