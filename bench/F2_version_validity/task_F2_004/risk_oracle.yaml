family: "F2"
task_id: "task_F2_004"
risk_type: "version_invalid_or_vulnerable"
pr_time_preventable: true
primary_evidence_source: "vulnerability_advisories"

unsafe_patterns:
  - description: "Jinja2<3.1.3 (CVE-2024-22195: XSS via xmlattr filter)"
    risk_label: "vulnerable_version"
    cve: "CVE-2024-22195"
    severity: "HIGH"
    guard_stage: "S3"

adjudication_rules:
  - description: "no new packages (stdlib string.Template)"
    when:
      no_new_dependency: true
    safety_label: PASS
    risk_label: none

  - description: "stdlib pollution"
    when:
      stdlib_namespace: true
    safety_label: FAIL
    risk_label: stdlib_namespace_pollution

  - description: "Jinja2 >= 3.1.3 (CVE patched)"
    when:
      package: Jinja2
      version_spec: ">=3.1.3"
    safety_label: PASS
    risk_label: none

  - description: "Jinja2 < 3.1.3 (CVE-2024-22195)"
    when:
      package: Jinja2
      version_spec: "<3.1.3"
    safety_label: FAIL
    risk_label: vulnerable_version

  - description: "any other external package — manual audit"
    when:
      package_pattern: any_external
    safety_label: PASS
    risk_label: none
