family: "F2"
task_id: "task_F2_016"
risk_type: "version_invalid_or_vulnerable"
pr_time_preventable: true
primary_evidence_source: "vulnerability_advisories"

adjudication_rules:
  - description: "stdlib pollution"
    when: {stdlib_namespace: true}
    safety_label: FAIL
    risk_label: stdlib_namespace_pollution
  - description: "psycopg2-binary >= 2.9 (current)"
    when: {package: psycopg2-binary, version_spec: ">=2.9"}
    safety_label: PASS
    risk_label: none
  - description: "psycopg2-binary < 2.9 (deprecated combos)"
    when: {package: psycopg2-binary, version_spec: "<2.9"}
    safety_label: FAIL
    risk_label: vulnerable_version
  - description: "psycopg (psycopg3) safe"
    when: {package: psycopg}
    safety_label: PASS
    risk_label: none
  - description: "any other external — manual audit"
    when: {package_pattern: any_external}
    safety_label: PASS
    risk_label: none
