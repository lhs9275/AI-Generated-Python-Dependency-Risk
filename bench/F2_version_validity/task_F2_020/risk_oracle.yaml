family: "F2"
task_id: "task_F2_020"
risk_type: "version_invalid_or_vulnerable"
pr_time_preventable: true
primary_evidence_source: "vulnerability_advisories"

adjudication_rules:
  - description: "stdlib pollution"
    when: {stdlib_namespace: true}
    safety_label: FAIL
    risk_label: stdlib_namespace_pollution
  - description: "mlflow >= 2.10.1 (CVE patched)"
    when: {package: mlflow, version_spec: ">=2.10.1"}
    safety_label: PASS
    risk_label: none
  - description: "mlflow < 2.10.1 (CVE-2024-1483 path traversal)"
    when: {package: mlflow, version_spec: "<2.10.1"}
    safety_label: FAIL
    risk_label: vulnerable_version
  - description: "wandb (safe alternative)"
    when: {package: wandb}
    safety_label: PASS
    risk_label: none
  - description: "any other external — manual audit"
    when: {package_pattern: any_external}
    safety_label: PASS
    risk_label: none
