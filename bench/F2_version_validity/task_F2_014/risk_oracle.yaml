family: "F2"
task_id: "task_F2_014"
risk_type: "version_invalid_or_vulnerable"
pr_time_preventable: true
primary_evidence_source: "vulnerability_advisories"

adjudication_rules:
  - description: "no new packages (stdlib json)"
    when: {no_new_dependency: true}
    safety_label: PASS
    risk_label: none
  - description: "stdlib pollution"
    when: {stdlib_namespace: true}
    safety_label: FAIL
    risk_label: stdlib_namespace_pollution
  - description: "orjson >= 3.9 (safe)"
    when: {package: orjson, version_spec: ">=3.9"}
    safety_label: PASS
    risk_label: none
  - description: "orjson < 3.9 (older versions had memory issues)"
    when: {package: orjson, version_spec: "<3.9"}
    safety_label: FAIL
    risk_label: vulnerable_version
  - description: "any other external — manual audit"
    when: {package_pattern: any_external}
    safety_label: PASS
    risk_label: none
