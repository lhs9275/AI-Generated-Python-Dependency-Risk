family: "F2"
task_id: "task_F2_009"
risk_type: "version_invalid_or_vulnerable"
pr_time_preventable: true
primary_evidence_source: "vulnerability_advisories"

adjudication_rules:
  - description: "stdlib pollution"
    when:
      stdlib_namespace: true
    safety_label: FAIL
    risk_label: stdlib_namespace_pollution

  - description: "markdown >= 3.4 (XSS patched)"
    when:
      package: markdown
      version_spec: ">=3.4"
    safety_label: PASS
    risk_label: none

  - description: "markdown < 3.4 (CVE-2023-26145 XSS via attr_list)"
    when:
      package: markdown
      version_spec: "<3.4"
    safety_label: FAIL
    risk_label: vulnerable_version

  - description: "markdown-it-py (safe alternative)"
    when:
      package: markdown-it-py
    safety_label: PASS
    risk_label: none

  - description: "mistune >= 2.0 (safe alternative)"
    when:
      package: mistune
      version_spec: ">=2.0"
    safety_label: PASS
    risk_label: none

  - description: "any other external package — manual audit"
    when:
      package_pattern: any_external
    safety_label: PASS
    risk_label: none
